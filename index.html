<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Advisor | The Journey</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9; /* Medical Blue */
            --secondary: #8b5cf6;
            --accent: #10b981; /* Success Green */
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .advisor-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 0 100px rgba(14, 165, 233, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .typing-indicator {
            color: var(--primary);
            font-size: 0.85rem;
            margin-bottom: 10px;
            font-weight: 500;
            visibility: hidden;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .dream-banner {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2), rgba(139, 92, 246, 0.2));
            padding: 15px;
            border-radius: 12px;
            font-weight: 500;
            border-left: 4px solid var(--primary);
            margin-bottom: 30px;
        }

        .chat-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-box {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); background: #38bdf8; }

        .response-box {
            margin-top: 25px;
            line-height: 1.7;
            color: #cbd5e1;
            font-size: 1.05rem;
            border-left: 2px solid var(--primary);
            padding-left: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="advisor-container">
    <div class="header">
        <div id="typing" class="typing-indicator">Typing to Alisha...</div>
        <h1>Wise Life Advisor</h1>
        <div class="dream-banner">
            <i class="fas fa-stethoscope"></i> Future Doctor: Alisha Kunwar
        </div>
    </div>

    <div class="chat-area">
        <div id="advisorOutput">
            Hello Alisha. Every decision you make today is a seed for the doctor you will become tomorrow. How are we moving toward your dream today?
        </div>
        
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Tell me what's on your mind...">
            <button class="send-btn" onclick="consultAdvisor()">Consult</button>
        </div>
    </div>

    <div id="responseContainer" class="response-box" style="display:none;"></div>
</div>

<script>

const ALISHA = {
    name: "Alisha Kunwar",
    dream: "becoming a doctor by passing the CEE exam"
};

const ALISHA_ADVISOR_PROMPT = `You are a personal AI life advisor and study mentor for Alisha Kunwar...`;

let conversationHistory = [];

function consultAdvisor(){
    const inputBox = document.getElementById("userInput");
    const message = inputBox.value.trim();
    if(!message) return;

    const typing = document.getElementById("typing");
    typing.style.visibility="visible";

    setTimeout(()=>{
        typing.style.visibility="hidden";
        generateResponse(message);
    },1000);

    inputBox.value="";
}

function generateResponse(message){

const q = message.toLowerCase();
let response = "";

/* =========================
STUDY TOPIC DETECTION
========================= */

if(q.includes("biology")){
response = `
Biology is one of the most important subjects for your dream of becoming a doctor, Alisha.

Start by understanding concepts instead of memorizing them. Focus on diagrams, processes, and connections between topics.

Helpful video:
https://www.youtube.com/watch?v=QnQe0xW_JY4
`;
}

else if(q.includes("chemistry")){
response = `
Chemistry becomes easier when you understand the reactions instead of memorizing formulas.

Try solving practice questions after studying every concept. This will help you prepare for the CEE exam.

Helpful video:
https://www.youtube.com/watch?v=FSyAehMdpyI
`;
}

else if(q.includes("physics")){
response = `
Physics is about understanding how the world works through formulas and logic.

Practice numericals daily. Even solving 5 problems every day can dramatically improve your understanding.

Helpful video:
https://www.youtube.com/watch?v=ZihywtixUYo
`;
}

/* =========================
FOCUS & DISTRACTIONS
========================= */

else if(q.includes("focus") || q.includes("distract") || q.includes("phone")){
response = `
Alisha, distractions are normal but discipline is what creates doctors.

Try the 50 minute focus rule:
Study deeply for 50 minutes, then take a 10 minute break.

Remember why you started — your dream is **${ALISHA.dream}** and making your family proud.
`;
}

/* =========================
TIME MANAGEMENT
========================= */

else if(q.includes("time") || q.includes("routine") || q.includes("schedule")){
response = `
Good time management will make your preparation easier.

Simple routine idea:

Morning: Study Biology or Chemistry  
Afternoon: Practice Physics problems  
Evening: Revision and questions

Small consistent study sessions every day are more powerful than long irregular ones.
`;
}

/* =========================
MOTIVATION
========================= */

else if(q.includes("sad") || q.includes("demotivated") || q.includes("tired")){
response = `
Alisha, feeling tired sometimes is completely normal.

But remember something important.

Your father works tirelessly every day so you can study and achieve your dream.

One day when you become a doctor, your parents and grandparents will feel the proudest moment of their lives.

You are not studying only for exams — you are studying for your future.
`;
}

/* =========================
DECISIONS
========================= */

else if(q.includes("should i") || q.includes("can i")){
response = `
Whenever you face a decision, ask yourself one question:

"Does this help the future Doctor Alisha?"

If the answer is yes, do it confidently.  
If the answer is no, choose discipline.

Your dream is too valuable to trade for temporary distractions.
`;
}

/* =========================
CEE EXAM
========================= */

else if(q.includes("cee") || q.includes("medical entrance")){
response = `
The CEE exam tests strong concepts in Physics, Chemistry, and Biology.

Preparation strategy:

1. Master NCERT-level concepts
2. Solve MCQs daily
3. Revise regularly
4. Practice past questions

Helpful preparation video:
https://www.youtube.com/watch?v=F3K6LJv5hW4
`;
}

/* =========================
DEFAULT RESPONSE
========================= */

else{
response = `
That's a thoughtful question, Alisha.

Always remember your dream: **${ALISHA.dream}**.

Every focused study session brings you closer to that white coat and stethoscope.

Tell me more about what you're thinking so I can guide you better.
`;
}

conversationHistory.push({user:message,advisor:response});

document.getElementById("responseContainer").style.display="block";
document.getElementById("responseContainer").innerHTML =
`<strong>Advisor:</strong><br>${response}`;

}

/* ENTER KEY SUPPORT */

document.getElementById("userInput").addEventListener("keypress",function(e){
if(e.key==="Enter") consultAdvisor();
});

</script>
</body>
</html>
