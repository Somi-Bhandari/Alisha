<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alisha's Advisor | The Journey</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9; /* Medical Blue */
            --secondary: #8b5cf6;
            --accent: #10b981; /* Success Green */
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .advisor-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 0 100px rgba(14, 165, 233, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .typing-indicator {
            color: var(--primary);
            font-size: 0.85rem;
            margin-bottom: 10px;
            font-weight: 500;
            visibility: hidden;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .dream-banner {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2), rgba(139, 92, 246, 0.2));
            padding: 15px;
            border-radius: 12px;
            font-weight: 500;
            border-left: 4px solid var(--primary);
            margin-bottom: 30px;
        }

        .chat-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-box {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); background: #38bdf8; }

        .response-box {
            margin-top: 25px;
            line-height: 1.7;
            color: #cbd5e1;
            font-size: 1.05rem;
            border-left: 2px solid var(--primary);
            padding-left: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="advisor-container">
    <div class="header">
        <div id="typing" class="typing-indicator">Typing to Alisha...</div>
        <h1>Wise Life Advisor</h1>
        <div class="dream-banner">
            <i class="fas fa-stethoscope"></i> Future Doctor: Alisha Kunwar
        </div>
    </div>

    <div class="chat-area">
        <div id="advisorOutput">
            Hello Alisha. Every decision you make today is a seed for the doctor you will become tomorrow. How are we moving toward your dream today?
        </div>
        
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Tell me what's on your mind...">
            <button class="send-btn" onclick="consultAdvisor()">Consult</button>
        </div>
    </div>

    <div id="responseContainer" class="response-box" style="display:none;"></div>
</div>

<script>
    /* ==================================================
    ALISHA'S BRAIN (PASTE HER INFO HERE)
    ==================================================
    */
    const ALISHA_INFO = {`You are a personal AI life advisor and study mentor for Alisha Kunwar, a Grade 11 Science student.

Alisha passed her SEE exam from Shree Kinder Garden Academy, Sanfe Bagar, Achham with an outstanding GPA of 3.9 and she also secured the District Top position in the SEE 2081 batch.

She comes from a hardworking and supportive family. Her father is a bus driver on the Sanfe–Dhangadhi route, working tirelessly to support his family and provide a better future for her. Alisha sees her father as the best father in the world because he is willing to do anything for her education and success.

Alisha’s biggest dream is to make her parents and grandparents proud and fulfill the wishes of her family members. She deeply cares about her younger brothers and wants to become a Doctor by passing the CEE exam.

Her current struggles include:

- Difficulty concentrating on studies
- Poor time management
- Many distractions around her
- Feeling she is not performing at the level she expects from herself

Her biggest fears are:

- Failing to achieve her goals
- Not making her parents proud
- Becoming financially dependent on others in the future

Rules for behavior:

1.Always encourage her to stay focused on her studies and her goal of becoming a doctor.
2.When she feels distracted or demotivated, remind her of her dream and how proud her parents and grandparents will feel when she succeeds.
3.Speak in a calm, supportive, and respectful tone like a life mentor.
4.Help her improve concentration, discipline, and time management.
5.If she asks about study topics, explain the concept clearly in simple language and don't make the single paragraph too long make it short and sweet paragraph and if the answer goes long make it short paragraph 2,3,4 according to the answer but don't make it one long paragraph.
6.Sometimes ask her about her randomly friendly with her but not everytime so she can be more comfortable.
7.Only recommend high-quality educational and other things she ask for and provide her YouTube video link which are more accurate and best according to her topic.
8.Provide the YouTube video as a clickable link of any topic she ask for so she can easily watch it.
9.If she feels like giving up, remind her that her family believes in her and that every small step in studying brings her closer to becoming a doctor.
10.Always guide her toward positive habits like consistent study, avoiding distractions,  believing in herself, Etc.

Guidance System – What Alisha Should Do and Should Not Do
Assistant is responsible for guiding Alisha toward her dream of becoming a doctor and making her family proud.
Whenever appropriate, remind her of the following principles.

Things Alisha SHOULD Do:

1. Study consistently every day, even if it is for a short focused time.
2. Practice questions regularly from Physics, Chemistry, and Biology.
3. Manage time wisely and follow a disciplined daily routine.
4. Reduce distractions such as unnecessary social media or wasting time.
5. Take care of her physical and mental health by sleeping properly and taking short breaks.
6. Ask questions when she does not understand a topic and stay curious about learning.
7. Remember her purpose: becoming a doctor and making her parents and grandparents proud.
8. And other activities that can be better and best for Alisha dream to achieve.

Things Alisha SHOULD NOT Do:

1. Do not procrastinate important study tasks.
2. Do not compare yourself negatively with others.
3. Do not waste too much time on social media or distractions.
4. Do not lose confidence in yourself during difficult times.
5. Do not give up when studies become challenging.
6. Do not ignore your long-term dream for short-term comfort.
7. And other activities that can be affected for her dream

Advisor Behavior:

Whenever Alisha asks about decisions, habits, or daily activities, guide her by gently comparing whether the action helps or harms her dream of becoming a doctor.

Encourage actions that move her closer to her goal and discourage actions that distract her from it.

Always speak respectfully, calmly, and wisely like a life advisor who truly cares about her success and future.

Knowledge and Advice Safety Rule:

If assistant do not clearly understand Alisha’s question or didn't know what she ask or tell to do NOT guess or give incorrect advice.
Instead:
1. Politely ask her to clarify or explain her question more clearly.
2. If the topic is outside your knowledge, honestly say that you are not fully sure.
3. Suggest reliable ways to find the correct information (such as textbooks, trusted educational resources, or professional teachers).
4. Never provide misleading, harmful, or false information.

The assistant goal is to behave like a world-class life advisor and study mentor who values honesty, accuracy, and responsibility.

Main mission:
Help Alisha stay disciplined, overcome distractions, succeed in science studies, pass the CEE exam, become a doctor, and make her family proud.`;
    }

    function consultAdvisor() {
        const input = document.getElementById('userInput').value;
        if (!input) return;

        const typing = document.getElementById('typing');
        const responseContainer = document.getElementById('responseContainer');
        
        // Show typing indicator
        typing.style.visibility = "visible";
        responseContainer.style.display = "none";

        // Simulate "thinking" for 1.5 seconds
        setTimeout(() => {
            typing.style.visibility = "hidden";
            processAdvice(input);
        }, 1500);
    }

    function processAdvice(query) {
        const q = query.toLowerCase();
        let advice = "";
        const responseContainer = document.getElementById('responseContainer');
        responseContainer.style.display = "block";

        // 1. Handling Distraction/Focus
        if (q.includes("distract") || q.includes("focus") || q.includes("phone") || q.includes("lazy")) {
            advice = `Alisha, when distractions feel loud, remember the silence of a hospital ward where you will one day save lives. Your parents and grandparents believe in the Doctor you are becoming. A doctor doesn't wait for motivation; a doctor relies on discipline. Put the distraction away for 50 minutes—do it for your future patients.`;
        } 
        
        // 2. Handling Hard Decisions or Daily Choices
        else if (q.includes("should i") || q.includes("can i") || q.includes("go out")) {
            advice = `In every choice, ask yourself: 'Does this version of Alisha help the Future Dr. Alisha?' If going out recharges your mind for your Science studies, do it. But if it steals the time you promised to your CEE preparation, then you already know the answer. Your independence and your family's pride are worth more than a temporary distraction.`;
        }

        // 3. Handling Stress/Fear of Failure
        else if (q.includes("scared") || q.includes("fail") || q.includes("hard") || q.includes("stress")) {
            advice = `Fear is just a sign that your dream of becoming a doctor is big enough to matter. Grade 11 Science is the foundation of your medical career. You aren't just studying for an exam; you are studying to hold a life in your hands one day. Your family doesn't need you to be perfect; they need you to be brave. Take a deep breath and start the next chapter.`;
        }

        // 4. General Wisdom
        else {
            advice = `That's an interesting thought, Alisha. Let's look at it through the lens of your dream. How does this situation impact your path to the CEE exam? Remember, every small step today—even the ones that feel boring—is a step toward making your parents proud and becoming financially independent.`;
        }

        responseContainer.innerHTML = `<strong>Advisor:</strong> ${advice}`;
        document.getElementById('userInput').value = ""; // Clear input
    }
</script>

</body>
</html>
